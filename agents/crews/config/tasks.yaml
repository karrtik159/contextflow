# CrewAI Task definitions

retrieve_context:
  description: >
    Search the vector database (pgvector) and the knowledge graph (Neo4j)
    in parallel for the user query: "{query}".
    Combine the results using Reciprocal Rank Fusion (RRF) and return
    the top 5 most relevant context snippets.
  expected_output: >
    A ranked list of up to 5 context snippets with source labels
    (vector_store or graph_db) and relevance scores.
  agent: context_gatherer

synthesize_answer:
  description: >
    Using the retrieved context and the user's memory profile,
    generate a clear, accurate, and concise answer to: "{query}".
    Keep the answer conversational and under 150 words (optimized for voice).
  expected_output: >
    A natural-sounding answer of at most 150 words that directly
    addresses the user's question, incorporating personalized context.
  agent: answer_synthesizer

extract_entities:
  description: >
    Analyze the following conversation transcript and extract all
    notable entities, user preferences, and relationships:
    ---
    {transcript}
    ---
  expected_output: >
    A structured JSON list of extracted facts, each with:
    entity_name, entity_type, relationship (optional), and confidence_score.
  agent: entity_extractor

update_graph:
  description: >
    Take the extracted entities and persist them into the user's
    knowledge graph via the Mem0 service. Create new nodes for unknown
    entities and update existing ones with new relationships.
  expected_output: >
    A summary of graph operations performed: nodes created, edges added,
    and any conflicts resolved.
  agent: graph_updater
