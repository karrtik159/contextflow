# CrewAI Task definitions for the background memory pipeline.

extract_entities:
  description: >
    Analyze the following conversation transcript and extract all
    notable entities, user preferences, and relationships:
    ---
    {transcript}
    ---
  expected_output: >
    A structured JSON list of extracted facts, each with:
    entity_name, entity_type, relationship (optional), and confidence_score.
  agent: entity_extractor

update_graph:
  description: >
    Take the extracted entities and persist them into the user's
    knowledge graph via the Mem0 service. Create new nodes for unknown
    entities and update existing ones with new relationships.
  expected_output: >
    A summary of graph operations performed: nodes created, edges added,
    and any conflicts resolved.
  agent: graph_updater
